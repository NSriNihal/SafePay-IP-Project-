<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>SafePay Email OTP</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <h2>Email OTP Verification</h2>

  <input type="email" id="email" placeholder="Enter your email">
  <br><br>

  <button onclick="sendOTP()">Send OTP</button>

  <br><br>

  <input type="text" id="otp" placeholder="Enter OTP" maxlength="6">
  <br><br>

  <button onclick="verifyOTP()">Verify OTP</button>

  <p id="msg"></p>
  <p id="otpHint"></p>

  <script src="app.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/emailjs-com@3/dist/email.min.js"></script>
  <script>
    if (SafePay.requireAuth()) {
      const pending = SafePay.getPendingTransaction();
      const currentUser = SafePay.getCurrentUser();
      const msgEl = document.getElementById("msg");
      const otpHintEl = document.getElementById("otpHint");
      const emailInput = document.getElementById("email");

      if (!pending || !currentUser) {
        alert("No pending transaction found");
        window.location.href = "transferfunds.html";
      } else {
        emailInput.value = currentUser.email;
      }

      try {
        emailjs.init("IWjGikVFkGUpfLZ8b");
      } catch (error) {
        console.error("EmailJS init failed:", error);
      }

      window.sendOTP = function () {
        const userEmail = emailInput.value.trim();

        if (!userEmail) {
          alert("Please enter email");
          return;
        }

        if (!currentUser || userEmail.toLowerCase() !== currentUser.email.toLowerCase()) {
          alert("Use the logged-in email address");
          return;
        }

        const generatedOTP = Math.floor(100000 + Math.random() * 900000).toString();
        const expiresAt = Date.now() + 5 * 60000;
        const expiryTime = new Date(expiresAt).toLocaleTimeString();

        SafePay.setOtpSession({
          code: generatedOTP,
          email: userEmail,
          expiresAt: expiresAt
        });

        msgEl.innerText = "OTP generated. Check your email. If email delivery fails, use the demo OTP below.";
        otpHintEl.innerText = "Demo OTP: " + generatedOTP;
        console.log("SafePay OTP:", generatedOTP);

        if (!globalThis.emailjs) {
          alert("Email service unavailable. Use the demo OTP shown on the page.");
          return;
        }

        emailjs.send(
          "service_965lcnh",
          "template_yenzvom",
          {
            email: userEmail,
            passcode: generatedOTP,
            time: expiryTime
          }
        )
        .then(function () {
          alert("OTP sent to your email");
        })
        .catch(function (error) {
          alert("Email delivery failed. Use the demo OTP shown on the page.");
          console.error("EmailJS send failed:", error);
        });
      };

      window.verifyOTP = function () {
        const enteredOTP = document.getElementById("otp").value.trim();
        const otpSession = SafePay.getOtpSession();

        if (!enteredOTP) {
          alert("Please enter OTP");
          return;
        }

        if (!otpSession) {
          msgEl.innerText = "OTP not sent";
          return;
        }

        if (Date.now() > otpSession.expiresAt) {
          SafePay.clearOtpSession();
          SafePay.clearPendingTransaction();
          msgEl.innerText = "OTP expired. Transaction aborted.";
          otpHintEl.innerText = "";
          return;
        }

        if (enteredOTP !== otpSession.code) {
          msgEl.innerText = "Invalid OTP";
          return;
        }

        const result = SafePay.commitPendingTransaction();
        if (!result.ok) {
          msgEl.innerText = result.message;
          return;
        }

        msgEl.innerText = "OTP verified successfully";
        otpHintEl.innerText = "";
        window.location.href = "sucesses.html";
      };
    }
  </script>

</body>
</html>
