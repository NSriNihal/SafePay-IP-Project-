<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Transfer Funds</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>

<body>

    <header class="page-header">
        <h1 class="brand">SafePay</h1>
        <nav class="top-nav">
            <a href="home.html">Home</a>
            <a href="about.html">About</a>
            <a href="profile.html">Profile</a>
            <a href="contact.html">Contact</a>
            <span class="nav-spacer"></span>
            <a href="login.html">Logout</a>
        </nav>
    </header>

<form class="text-center p-4">
  <h2>Transfer Funds</h2>

  <input type="text" id="accno" placeholder="Your Account Number"><br><br>
  <input type="text" id="raccno" placeholder="Receiver Account Number"><br><br>
  <input type="number" id="amount" placeholder="Amount"><br><br>
  <input type="password" id="pin" placeholder="PIN"><br><br>

  <button type="button" onclick="transfer()">Send</button>
</form>

<script src="app.js"></script>
<script>
function transfer() {
  if (!SafePay.requireAuth()) {
    return;
  }

  const sender = SafePay.getCurrentUser();

  const acc = accno.value.trim();
  const racc = raccno.value.trim();
  const amt = Number(amount.value);
  const pinVal = pin.value;

  if (!acc || !racc || amt <= 0 || !pinVal) {
    alert("Fill all fields correctly");
    return;
  }

  if (sender.profile.accountNumber !== acc) {
    alert("Enter your logged-in account number");
    return;
  }

  if (acc === racc) {
    alert("Sender and receiver account cannot be the same");
    return;
  }

  const receiver = SafePay.findUserByAccount(racc);
  if (!receiver) {
    alert("Receiver account not found");
    return;
  }

  if (pinVal !== sender.pin) {
    alert("Wrong PIN");
    return;
  }

  if (sender.balance < amt) {
    alert("Insufficient balance");
    return;
  }

  SafePay.setPendingTransaction({
    id: SafePay.createTransactionId(),
    from: acc,
    to: racc,
    amount: amt
  });
  SafePay.clearOtpSession();
  window.location.href = "otp.html";
}

SafePay.requireAuth();
</script>

</body>
</html>
